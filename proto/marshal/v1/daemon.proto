syntax = "proto3";

package marshal.v1;

option go_package = "marshal/internal/pb;pb";

// Daemon is the control surface marshald exposes over the Unix socket.
// M2 implements every RPC except Logs (reserved for M3).
service Daemon {
  rpc Start(StartRequest) returns (ProcList);
  rpc Stop(Selector) returns (ProcList);
  rpc Restart(Selector) returns (ProcList);
  rpc Delete(Selector) returns (ProcList);
  rpc List(Empty) returns (ProcList);
  rpc Describe(Selector) returns (ProcList);
  rpc Save(Empty) returns (Ack);
  rpc Resurrect(Empty) returns (ProcList);
  rpc Kill(Empty) returns (Ack);
  rpc Logs(LogRequest) returns (stream LogLine); // M3 — defined, not implemented
  rpc MetricsHistory(MetricsHistoryRequest) returns (MetricsHistoryResponse); // M5
  rpc Reset(Selector) returns (ProcList);
  rpc Flush(Selector) returns (Ack);
}

message Empty {}

message Ack {
  bool ok = 1;
  string message = 2;
}

// GitSource describes deploying an app from a git repository. It mirrors
// config.GitSource. Only repo is required; ref empty → default branch,
// build empty → auto-detected, subdir empty → repo root.
message GitSource {
  string repo       = 1;
  string ref        = 2;
  string build      = 3;
  string subdir     = 4;
  string credential = 5; // M22: credstore name (non-secret), persisted for redeploy
}

// AppSpec mirrors config.App. kill_timeout is a Go duration string ("5s").
message AppSpec {
  string name = 1;
  string cmd = 2;
  repeated string args = 3;
  string cwd = 4;
  int32 instances = 5;
  map<string, string> env = 6;
  string restart = 7; // always | on-failure | no
  int32 max_restarts = 8;
  string kill_timeout = 9;
  optional LogRetention logs = 10; // M6 per-app retention override
  optional GitSource source = 11; // M21 git deploy; nil for command apps
  int64 max_memory_restart = 12; // bytes; 0 = disabled
}

message StartRequest { repeated AppSpec apps = 1; }

// Selector resolves to a name, a numeric id, or the literal "all".
message Selector { string target = 1; }

// ProcInfo mirrors a supervised instance snapshot. cpu/mem are reserved for M3.
message ProcInfo {
  int32 id = 1;
  string name = 2;
  int32 instance_id = 3;
  string state = 4;
  int32 pid = 5;
  int64 uptime_ms = 6;
  int32 restarts = 7;
  double cpu = 8; // M3
  int64 mem = 9;  // M3
  string source     = 10; // M21 "command" | "git" — drives the redeploy button
  string detail     = 11; // M21 status summary for synthetic deploy entries
  string credential = 12; // M22: credential name (non-secret) → drives redeploy resolution
  int32  threads     = 13; // M-D: thread count, summed over the process group
  int32  open_fds    = 14; // M-D: open FD count; -1 = unavailable on this platform
  int32  exit_code   = 15; // M-D: last exit code; -1 if signaled / spawn failure
  string exit_reason = 16; // M-D: last exit reason; "" = never exited
  int32 restarts24h       = 17; // M-E: restart events in the trailing 24h (JSON: restarts_24h)
  int64 last_restart_unix = 18; // M-E: unix seconds of the most recent restart (0 = none in retention)
}

message ProcList { repeated ProcInfo procs = 1; }

// M6 — log stream selector.
enum LogStream {
  LOG_STREAM_UNSPECIFIED = 0; // merged (default)
  LOG_STREAM_STDOUT      = 1;
  LOG_STREAM_STDERR      = 2;
}

// M3 — log streaming.
message LogRequest {
  string    target = 1;
  int32     lines  = 2;
  bool      follow = 3;
  LogStream stream = 4; // M6
}

// M6 — per-app log retention settings.
message LogRetention {
  optional int32 max_size_mb  = 1;
  optional int32 max_backups  = 2;
  optional int32 max_age_days = 3;
  optional bool  compress     = 4;
}

message LogLine {
  string name = 1;
  int32 instance_id = 2;
  bool stderr = 3;
  string line = 4;
}

// M5 — metric history.
message MetricsHistoryRequest {
  string selector  = 1;            // name or id, resolved like logs/describe
  int64  since_ms  = 2;            // lookback window in ms; server queries ts >= now - since_ms
  int64  bucket_ms = 3;            // bucket width in ms; 0 = server auto-picks (~60 buckets)
}

message MetricBucket {
  int64  ts_ms   = 1;
  double cpu_avg = 2;
  double cpu_max = 3;
  uint64 mem_avg = 4;
  uint64 mem_max = 5;
}

message MetricsHistoryResponse { repeated MetricBucket buckets = 1; }
