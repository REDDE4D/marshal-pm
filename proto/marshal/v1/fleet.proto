syntax = "proto3";

package marshal.v1;

option go_package = "marshal/internal/pb;pb";

import "marshal/v1/daemon.proto"; // reuse ProcInfo

// Fleet is the agent<->server control surface (M7: connection + live state).
service Fleet {
  // Agent-initiated, long-lived, bidirectional. M7 uses only the upstream direction.
  rpc Connect(stream AgentMessage) returns (stream ServerMessage);
  // Read path for the fleet CLI (and, later, the dashboard).
  rpc ListFleet(ListFleetRequest) returns (ListFleetResponse);
  // Metric history for one agent's app/instance (M8); reuses daemon.proto's response.
  rpc FleetMetricsHistory(FleetMetricsHistoryRequest) returns (MetricsHistoryResponse);
  // Log history for one agent's app/instance (M8b); reuses daemon.proto's LogLine.
  rpc FleetLogsHistory(FleetLogsHistoryRequest) returns (FleetLogsHistoryResponse);
  // Route a control command to one agent and return its result (M9).
  rpc FleetControl(FleetControlRequest) returns (FleetControlResponse);
}

message AgentMessage {
  oneof msg {
    Hello hello = 1;            // sent once on connect
    StateSnapshot snapshot = 2; // full process-state snapshot (periodic)
    MetricBatch metrics = 3;    // raw CPU/mem samples (M8)
    LogBatch logs = 4;          // captured stdout/stderr lines (M8b)
    CommandResult result = 5;   // M9: result of a routed command
  }
}

message ServerMessage {
  oneof msg {
    HelloAck hello_ack = 1;
    Command  command   = 2; // M9: control command routed down to the agent
  }
}

message Hello {
  string agent_name      = 1;
  string marshal_version = 2;
  string hostname        = 3; // os.Hostname()
  string os              = 4; // runtime.GOOS
  string arch            = 5; // runtime.GOARCH
  int64  host_boot_unix  = 6; // host boot time; uptime = now - boot
}

message HelloAck {
  int64 last_metric_ts_ms = 1; // server's stored high-water-mark for this agent (0 = none)
  int64 last_log_ts_ms = 2;    // server's stored log high-water-mark (0 = none)
  string agent_token = 3;      // M10: minted per-agent token (set only on enrollment)
}

message StateSnapshot { repeated ProcInfo procs = 1; } // ProcInfo from daemon.proto

message ListFleetRequest {}

message ListFleetResponse { repeated AgentState agents = 1; }

message AgentState {
  string agent_name      = 1;
  bool   connected       = 2;
  int64  last_seen_unix  = 3;
  repeated ProcInfo procs = 4;
  string hostname        = 5;
  string ip              = 6; // server-derived from the gRPC peer
  string os              = 7;
  string arch            = 8;
  string marshal_version = 9;
  int64  host_boot_unix  = 10;
}

// One stored metric row, flattened to map 1:1 to a metricstore row.
message MetricSample {
  int64  ts_ms = 1;
  string label = 2; // "app#instance"
  double cpu   = 3;
  int64  mem   = 4;
}

message MetricBatch { repeated MetricSample samples = 1; }

// One captured log line, flattened to map 1:1 to a logstore row.
message LogShipLine {
  int64  ts_ms  = 1;
  string label  = 2; // "app#instance"
  bool   stderr = 3;
  string text   = 4;
}

message LogBatch { repeated LogShipLine lines = 1; }

message FleetLogsHistoryRequest {
  string    agent_name = 1;
  string    selector   = 2; // app name or "name#instance" label
  int32     lines      = 3; // backfill count
  LogStream stream     = 4; // reuse daemon.proto enum; unspecified = merged
  string    grep       = 5; // only lines containing this substring (case-insensitive); empty = all
}

message FleetLogsHistoryResponse { repeated LogLine lines = 1; } // LogLine from daemon.proto

message FleetMetricsHistoryRequest {
  string agent_name = 1;
  string selector   = 2; // app name or "name#instance" label
  int64  since_ms   = 3;
  int64  bucket_ms  = 4;
}

enum CredentialKind {
  CRED_HTTPS = 0;
  CRED_SSH   = 1;
}

message GitCredential {
  string         username    = 1;
  string         token       = 2; // HTTPS only
  string         private_key = 3; // SSH only — sealed in transit by TLS; never persisted on the agent
  string         known_hosts = 4; // SSH only — the server-pinned host key line(s)
  CredentialKind kind        = 5; // default CRED_HTTPS keeps M22/M24 agents working
}

// M23 — read-only file browser for deployed apps.
message ListDirRequest  { string app = 1; string path = 2; } // path: relative to clone root; "" = root
message ReadFileRequest { string app = 1; string path = 2; }

message DirEntry {
  string name     = 1;
  bool   is_dir   = 2;
  int64  size     = 3;
  int64  mod_unix = 4;
  uint32 mode     = 5; // unix perm bits, for display
}
message DirListing  { string path = 1; repeated DirEntry entries = 2; }
message FileContent {
  string path      = 1;
  bytes  content   = 2;
  int64  size      = 3; // true on-disk size (may exceed len(content) when truncated/binary)
  bool   truncated = 4; // content is a head, capped at maxFileBytes
  bool   binary    = 5; // NUL-byte sniff: not rendered as text
}

message DeployRequest {
  AppSpec       app        = 1;
  GitCredential credential = 2; // M22: secret attached per-op, never persisted on the agent
}

message RedeployRequest {
  string        target     = 1; // M21 app name
  GitCredential credential = 2; // M22
}

enum CommitKind {
  COMMIT_EDIT   = 0;
  COMMIT_CREATE = 1;
  COMMIT_DELETE = 2;
  COMMIT_RENAME = 3;
}

// M24 — a single file mutation (edit/create/delete/rename) committed and pushed.
message CommitRequest {
  string        app        = 1;
  CommitKind    kind       = 2;
  string        path       = 3; // target (edit/create/delete) or rename source
  string        new_path   = 4; // rename destination only
  bytes         content    = 5; // edit/create only
  string        message    = 6; // commit message (server fills a default)
  GitCredential credential = 7; // M22 secret, attached per-op, never persisted
}
message CommitResult { string sha = 1; string branch = 2; }

// M9 — control-plane command surface, shared by the down-stream Command and the
// CLI's unary FleetControl so the op/result shapes have one definition.
message ControlOp {
  oneof op {
    Selector     stop    = 1;
    Selector     restart = 2;
    Selector     delete  = 3;
    StartRequest start   = 4; // reuses AppSpec from daemon.proto
    DeployRequest   deploy   = 5; // M21
    RedeployRequest redeploy = 6; // M21
    ListDirRequest  list_dir  = 7; // M23
    ReadFileRequest read_file = 8; // M23
    CommitRequest   commit    = 9; // M24
  }
}

message ControlResult {
  bool              ok    = 1;
  string            error = 2; // set when ok == false
  repeated ProcInfo procs = 3; // affected instances on success
  DirListing  dir  = 4; // M23, set on list_dir success
  FileContent file = 5; // M23, set on read_file success
  CommitResult commit = 6; // M24, set on commit success
}

message Command       { uint64 request_id = 1; ControlOp     op     = 2; } // server -> agent
message CommandResult { uint64 request_id = 1; ControlResult result = 2; } // agent -> server

message FleetControlRequest  { string agent_name = 1; ControlOp op = 2; }
message FleetControlResponse { ControlResult result = 1; }
