name: 💡 Feature request
description: Suggest an idea or improvement for Marshal.
title: "[feat]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Marshal is built bottom-up, milestone by milestone — see
        `docs/` for the design specs and plans behind existing features.
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: The use case or pain point. "I'm trying to … but Marshal can't …".
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like Marshal to do. Rough is fine.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or existing workarounds you've thought about.
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Which area?
      options:
        - Process supervision
        - CLI
        - Fleet / central server
        - Web dashboard
        - Logs & metrics
        - Git deploy / credentials
        - Other
    validations:
      required: true
