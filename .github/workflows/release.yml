name: Release

# Cut a release when a vX.Y.Z tag is pushed: GoReleaser cross-builds the
# version-stamped (CGO-free) binaries, attaches archives + checksums to a GitHub
# Release, and updates the Homebrew tap. Config lives in .goreleaser.yaml.
# See CLAUDE.md for the release flow.
on:
  push:
    tags: ['v*']

permissions:
  contents: write # create the Release and upload assets

jobs:
  release:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # GoReleaser needs full history + tags
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run tests
        run: go test ./...
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          # Automatic; creates the Release in this repo.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # A PAT (classic `repo`, or fine-grained contents:write on
          # REDDE4D/homebrew-tap) so GoReleaser can push the formula to the
          # separate tap repo. Add under Settings → Secrets and variables →
          # Actions. Without it the binary release still succeeds; only the
          # Homebrew update is skipped.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
